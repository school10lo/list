<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 школа</title>
<style>
body {
  background: linear-gradient( 145deg,#3b1f0c,#4a2a12,#5a3418,#6b4020);
  position: relative;
}

body::before {
  background-image: url(animals.svg);
}

body::after {
  background:
    radial-gradient(
      circle at top,
      rgba(255, 180, 90, .12),
      rgba(0, 0, 0, .6)
    );
}

.pisapopa {
  background: rgba(20, 10, 4, .35);
}

img {
  width: min(60vmin, 25rem);
  aspect-ratio: 1 / 1;
  border-radius: min(10vmin, 4rem);
  box-shadow: 0 0 35px rgba(255, 170, 60, .25);
}

.s {
  width: 100%;
  margin-top: min(5vmin, 1rem);
}

div .p {
  font-size: min(3vmin, 1.25rem);
  opacity: .85;
}

.l {
  background: linear-gradient(
    145deg,
    #7a3b00,
    #4b2504);
  box-shadow:
    0 6px 18px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.08);
  border: 1px solid rgba(200, 100, 50, .5);
  color: #fff;
  font-weight: 500;
  transition:
    transform .18s ease,
    box-shadow .18s ease,
    background .4s ease;
}

.l:hover {
  transform: translateY(-2px);
  box-shadow:
    0 12px 28px rgba(0,0,0,.6);
}

.l:active {
  transform: translateY(1px) scale(.97);
}


@font-face {
  font-family: 'Copperplate';
  src: url('Copperplate.woff') format('woff');
}

* {
  margin: 0;
  box-sizing: border-box;
  font-family: "Copperplate", Roboto, sans-serif;
}

html, body {
  min-height: 100dvh;
  width: 100%;
  overflow-x: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start; 
  color: #fff;
}

.tt {
  font-weight: 800;
  font-size: min(10vmin, 4.5rem);
}

.sw {
  width: 90%;
  max-width: 50rem;
  padding: min(3vmin, 2rem);
  display: flex;
  justify-content: center;
}

.pisapopa {
  width: 100%;
  text-align: center;
  border-radius: min(6vmin, 3rem);
  padding: min(5vmin, 2rem);
}

@supports (backdrop-filter: blur(.8px)) {
  .pisapopa {
    backdrop-filter: blur(.8px);
  }
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-repeat: repeat-x;
  background-position: center top;
  background-size: auto 100vh;
  opacity: .25;
  filter: invert(100%);
  transition: background-position 2s ease;
  z-index: -2;
}

body::after {
  content: "";
  position:fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}

.lala {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: min(3vmin, .5rem);
}

.l {
  width: 100%;
  padding: min(3vmin, 1rem);
  border-radius: min(4vmin, 1rem);
  font-size: min(4vmin, 1.5rem);
  cursor: pointer;
  text-decoration: none;
  color: #fff;
}

::-webkit-scrollbar { width: 0; height: 0; }
html { scrollbar-width: none; }
body { -ms-overflow-style: none; }
button, div { -webkit-tap-highlight-color: transparent; background-color: none; }

/*матвей лох*/
</style>
</head>
<body>
<div class="sw">
  <div class="pisapopa">

    <div class="pr">
      <img src="gl.jpg">
      <div class=tt>10 школа</div>
    </div>

    <div class="s">
      <div class="lala">
        <div class="p"><span style="letter-spacing: 1em; display: inline-block;">БАЗИ</span>С</div>
        <a class="l" href="https://t.me/school10lo">10 школа любит</a>
        <a class="l" href="https://t.me/school10lo_bot">бот предложка/удаление поста</a>
      </div>
    </div>

    <div class="s">
      <div class="lala">
        <div class="p"><span style="letter-spacing: 1em; display: inline-block;">ДО</span>П</div>
        <a class="l" href="https://test.socialapi.serv00.net/#g694550bbabd278c3640753e7">анон чат</a>
        <a class="l" href="ras.html">расписание</a>
        <a class="l" href="#">потом</a>
      </div>
    </div>

  </div>
</div>
</body>
</html>
