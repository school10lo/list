<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>расписание</title>
<link rel="stylesheet" href="style.css">
<style>
html, body {
  width: 100%;
  overflow-x: hidden;
}

body {
  background: linear-gradient(160deg, #1f1f1f, #2b2b2b, #3a3a3a);
}

body::before {
  background-image: url(ras/math.svg);
}

body::after {
  background: radial-gradient(
    circle at top,
    rgba(255,255,255,0.08),
    rgba(0,0,0,0.65)
  );
}

.pisapopa {
  background: rgba(25,25,25,0.65);
  padding: min(8vmin, 1.5rem) min(15vmin, 1.5rem) min(8vmin, 1rem);
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}

.l {
  background: linear-gradient(145deg, #4a4a4a, #2f2f2f);
  border: 1px solid rgba(100, 100, 100);
  color: #fff;
}

.l.active {
  background: linear-gradient(145deg, #6a6a6a, #404040);
}
</style>
</head>

<body>
<div class="sw">
  <div class="pisapopa">
    <div class="lala">
      <button class="l" data-id="1">1 класс</button>
      <div class="content"><div><img src="ras/1.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="2">2 класс</button>
      <div class="content"><div><img src="ras/2.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="3">3 класс</button>
      <div class="content"><div><img src="ras/3.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="4">4 класс</button>
      <div class="content"><div><img src="ras/4.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="5">5 класс</button>
      <div class="content"><div><img src="ras/5.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="6">6 класс</button>
      <div class="content"><div><img src="ras/6.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="7">7 класс</button>
      <div class="content"><div><img src="ras/7.jpg" loading="lazy" decoding="async" alt="лялялялял"></div></div>
      <button class="l" data-id="8">8 класс</button>
      <div class="content"><div><img src="ras/8.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="9">9 класс</button>
      <div class="content"><div><img src="ras/9.jpg" loading="lazy" decoding="async" alt="ялялляля"></div></div>
      <button class="l" data-id="10">10 класс</button>
      <div class="content"><div><img src="ras/10.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="11">11 класс</button>
      <div class="content"><div><img src="ras/11.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="12">12 класс</button>
      <div class="content"><div><img src="ras/12.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="13">13 класс</button>
      <div class="content"><div><img src="ras/13.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="14">14 класс</button>
      <div class="content"><div><img src="ras/14.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
      <button class="l" data-id="15">15 класс</button>
      <div class="content"><div><img src="ras/15.jpg" loading="lazy" decoding="async" alt="нету"></div></div>
    </div>
  </div>
</div>

<div class="viewer" id="viewer"><img decoding="async" alt="просмотр"></div>

<script>
(() => {
  const lala = document.querySelector('.lala');
  const viewer = document.getElementById('viewer');
  const viewerImg = viewer.querySelector('img');

  function closeAll() {
    document.querySelectorAll('.l').forEach(b => {
      b.classList.remove('active');
      if (b.nextElementSibling) b.nextElementSibling.classList.remove('open');
    });
  }

  // Event delegation: one listener for buttons and image clicks
  lala.addEventListener('click', (e) => {
    const btn = e.target.closest('.l');
    if (btn && lala.contains(btn)) {
      const wasOpen = btn.classList.contains('active');
      closeAll();
      if (!wasOpen) {
        btn.classList.add('active');
        const content = btn.nextElementSibling;
        if (content) content.classList.add('open');
        try { localStorage.setItem('open', btn.dataset.id); } catch(_) {}
      } else {
        try { localStorage.removeItem('open'); } catch(_) {}
      }
      return;
    }

    const img = e.target.closest('.content img');
    if (img) {
      viewerImg.src = img.src;
      viewer.classList.add('show');
    }
  });

  viewer.addEventListener('click', () => viewer.classList.remove('show'));

  // restore open state
  try {
    const saved = localStorage.getItem('open');
    if (saved) {
      const btn = document.querySelector(`.l[data-id="${saved}"]`);
      if (btn) btn.classList.add('active'), btn.nextElementSibling?.classList.add('open');
    }
  } catch(_) {}
})();
</script>
</body>
</html>
