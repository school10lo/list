<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2f2f2f">
    <meta name="description" content="Расписание">
    <link rel="icon" type="image/png" href="./gl.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Расписание">
    <link rel="apple-touch-icon" href="./gl.jpg">
    <title>Расписание</title>
<link rel="stylesheet" href="./style.css">
<style>

body {
  background: linear-gradient( 145deg,#3a1c07,#472307,#542a0c,#562c0c);
  position: relative;
}

body::before {
  background-image: url(animals.svg);
}

body::after {
  background:
    radial-gradient(
      circle at top,
      rgba(255, 180, 90, .12),
      rgba(0, 0, 0, .6)
    );
}

.pisapopa {
  background: radial-gradient(ellipse at center, rgba(26, 10, 1, 0.79) 0%, rgba(20, 10, 4, 0.38) 75%);
}

img {
  width: 100%;
  border-radius: min(6vmin, 3rem);
  box-shadow: 0 0 4vmin rgba(0, 0, 0, 0.5);
  border: min(.5vmin, 2px) solid rgb(201, 90, 36);
}

div .p {
  font-size: min(2vmin, 1rem);
  opacity: .6;
}

.l {
  background: linear-gradient( 145deg, #7a3b0061, #4b250447);
  border: min(.5vmin, 2px) solid rgba(200, 99, 50, 0.64);
  font-size: min(5vmin, 2rem);
}

.l:active {
  transform: translateY(1px) scale(.97);
}

/*матвей лох*/

</style>
</head>
<body>
<div class="hint" id="hint">
  <div class="hint-box">
    <div class="hint-text">
     ︎ • это кнопки<br>
     ︎ • нажми на фото, чтобы открыть полностью<br><br>
    ︎ ■ отсутвующие расписание можно скинуть в предложку канала<br>
    ︎ ■ чтобы было удобнее, можно добавить это на главный экран. здесь также сохраняется открытое расписание
    </div>
    <button class="l hint-btn">оке</button>
  </div>
</div> 
<div class="sw">
  <div class="pisapopa">
    <div class="lala" id="lala">
    </div>
  </div>
</div>

<div class="viewer" id="viewer"><img decoding="async" alt="просмотр"></div>

<script>
const data = [
  { id: 5, label: '5 класс' },
  { id: 7, label: '7 класс' },
  { id: 8, label: '8 класс' },
  { id: 9, label: '9 класс' },
  { id: 1011, label: '10 и 11 класс' },
  { id: '6_2', label: '6 класс 2 смена' },
  { id: '7_2', label: '7 класс 2 смена' },
  { id: 'time', label: 'Время' },
];

const wrap   = document.getElementById('lala');
const viewer = document.getElementById('viewer');
const vImg   = viewer.querySelector('img');
const hint   = document.getElementById('hint');

if (hint && localStorage.getItem('hintClosed')) {
  hint.remove();
}

if (hint) {
  const btn = hint.querySelector('.hint-btn');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    localStorage.setItem('hintClosed', '1');
    hint.remove();
  });
}

data.forEach(({ id, label }) => {
  wrap.insertAdjacentHTML('beforeend', `
    <button class="l" data-id="${id}">${label}</button>
    <div class="content">
      <div><img src="ras/${id}.jpg" loading="lazy"></div>
    </div>
  `);
});

function closeAll() {
  wrap.querySelectorAll('.l.active').forEach(b => {
    b.classList.remove('active');
    b.nextElementSibling.classList.remove('open');
  });
}

wrap.addEventListener('click', e => {
  const btn = e.target.closest('.l');
  if (!btn || !wrap.contains(btn)) return;

  const opened = btn.classList.contains('active');
  closeAll();

  if (!opened) {
    btn.classList.add('active');
    btn.nextElementSibling.classList.add('open');
    localStorage.setItem('open', btn.dataset.id);
  } else {
    localStorage.removeItem('open');
  }
});

wrap.addEventListener('click', e => {
  const img = e.target.closest('.content img');
  if (!img) return;

  e.stopPropagation();
  vImg.src = img.src;
  viewer.classList.add('show');
});

viewer.addEventListener('click', () => {
  viewer.classList.remove('show');
});

const saved = localStorage.getItem('open');
if (saved) {
  const btn = wrap.querySelector(`.l[data-id="${saved}"]`);
  btn?.click();
}

const sizes = document.querySelectorAll('#lala');
if (navigator.userAgent.indexOf('Win') != -1) sizes.forEach(size => size.classList.add('w'));
if (navigator.userAgent.indexOf('Mac') != -1) sizes.forEach(size => size.classList.add('w'));
if (navigator.userAgent.indexOf('Android') != -1) sizes.forEach(size => size.classList.add('a'));
if (navigator.userAgent.indexOf('like Mac') != -1) sizes.forEach(size => size.classList.add('a'));
</script>
</body>
</html>
